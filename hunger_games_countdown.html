<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каунтдаун до Ревью - Голодные Игры</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cinzel', serif;
            background: url('https://pbs.twimg.com/media/GeVXG3VXAAAUAiK.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
            z-index: 10;
            gap: 100px;
        }

        .left-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .right-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tribute-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            transition: all 0.5s ease;
        }

        .dramatic-text {
            color: #8B0000;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 40px;
            text-align: center;
            animation: textPulse 3s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% {
                transform: scale(1);
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            }
            50% {
                transform: scale(1.05);
                text-shadow: 2px 2px 8px rgba(255, 215, 0, 0.8);
            }
        }

        .countdown {
            display: flex;
            gap: 30px;
            color: white;
            font-size: 3rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            height: 120px;
        }

        .time-value {
            position: relative;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
        }

        .time-digit {
            position: absolute;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .time-digit.falling {
            transform: translateY(100px);
            opacity: 0;
        }

        .time-digit.rising {
            transform: translateY(-100px);
            opacity: 0;
        }

        .time-digit.current {
            transform: translateY(0);
            opacity: 1;
        }

        .time-label {
            font-size: 1rem;
            color: #8B0000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .lightning {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: lightning 10s infinite;
            pointer-events: none;
        }

        @keyframes lightning {
            0%, 90%, 100% { opacity: 0; }
            91%, 95% { opacity: 1; }
        }

        .fade-transition {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .fade-transition.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="lightning"></div>
    
    <div class="container">
        <div class="left-content">
            <div class="dramatic-text">Ревью уже скоро...</div>
            
            <div class="countdown">
                <div class="time-unit">
                    <div class="time-value">
                        <span class="time-digit current" id="days">00</span>
                    </div>
                    <div class="time-label">Дни</div>
                </div>
                
                <div class="time-unit">
                    <div class="time-value">
                        <span class="time-digit current" id="hours">00</span>
                    </div>
                    <div class="time-label">Часы</div>
                </div>
                
                <div class="time-unit">
                    <div class="time-value">
                        <span class="time-digit current" id="minutes">00</span>
                    </div>
                    <div class="time-label">Минуты</div>
                </div>
                
                <div class="time-unit">
                    <div class="time-value">
                        <span class="time-digit current" id="seconds">00</span>
                    </div>
                    <div class="time-label">Секунды</div>
                </div>
            </div>
        </div>
        
        <div class="right-content">
            <img id="tributePhoto" class="tribute-photo fade-transition" src="" alt="Участник команды">
        </div>
    </div>

    <script>
        // Массив с фотографиями участников команды
        const teamPhotos = [
            'https://center.yandex-team.ru/api/v1/user/andysh/photo_49989/original.jpg',
            'https://center.yandex-team.ru/api/v1/user/antoffee/photo_820403/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/mariakl5227/photo/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/dvornicked/photo_606078/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/efimweb/photo_843162/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/puzanovaira/photo/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/yurich/photo_9813/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/erfc/photo_215628/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/danilyukmary/photo_884954/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/nasta-ssea/photo_355024/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/aantonevich/photo_193193/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/dimadobudko/photo_127517/460.jpg',
            'https://center.yandex-team.ru/api/v1/user/ikochedykov/photo/460.jpg'
        ];

        let currentPhotoIndex = 0;
        const photoElement = document.getElementById('tributePhoto');

        // Дата ревью: 15.06.2026 13:00 по МСК
        const reviewDate = new Date('2026-06-15T10:00:00Z'); // 13:00 МСК = 10:00 UTC

        // Создание звезд
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Смена фотографий каждые 5 секунд
        function changePhoto() {
            photoElement.classList.remove('visible');
            
            setTimeout(() => {
                currentPhotoIndex = (currentPhotoIndex + 1) % teamPhotos.length;
                photoElement.src = teamPhotos[currentPhotoIndex];
                photoElement.classList.add('visible');
            }, 250);
        }

        // Анимация падения цифр (только для дней, часов и минут)
        function animateDigitChange(elementId, newValue) {
            const element = document.getElementById(elementId);
            const currentDigit = element.textContent;
            
            if (currentDigit !== newValue) {
                // Для секунд просто меняем значение без анимации
                if (elementId === 'seconds') {
                    element.textContent = newValue;
                    return;
                }
                
                // Создаем новый элемент для новой цифры
                const newDigit = document.createElement('span');
                newDigit.className = 'time-digit rising';
                newDigit.textContent = newValue;
                element.parentNode.appendChild(newDigit);
                
                // Анимация падения старой цифры
                element.classList.add('falling');
                
                // Анимация появления новой цифры
                setTimeout(() => {
                    newDigit.classList.remove('rising');
                    newDigit.classList.add('current');
                }, 50);
                
                // Удаление старой цифры и замена
                setTimeout(() => {
                    element.remove();
                    newDigit.id = elementId;
                }, 800);
            }
        }

        // Обновление каунтдауна
        function updateCountdown() {
            const now = new Date();
            const timeLeft = reviewDate - now;

            if (timeLeft > 0) {
                const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                animateDigitChange('days', days.toString().padStart(2, '0'));
                animateDigitChange('hours', hours.toString().padStart(2, '0'));
                animateDigitChange('minutes', minutes.toString().padStart(2, '0'));
                animateDigitChange('seconds', seconds.toString().padStart(2, '0'));
            } else {
                // Ревью началось!
                document.querySelector('.dramatic-text').textContent = 'РЕВЬЮ НАЧАЛОСЬ!';
                animateDigitChange('days', '00');
                animateDigitChange('hours', '00');
                animateDigitChange('minutes', '00');
                animateDigitChange('seconds', '00');
            }
        }

        // Инициализация
        function init() {
            createStars();
            
            // Загружаем первую фотографию
            photoElement.src = teamPhotos[0];
            photoElement.classList.add('visible');
            
            // Запускаем каунтдаун
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            // Запускаем смену фотографий
            setInterval(changePhoto, 5000);
        }

        // Запуск после загрузки страницы
        window.addEventListener('load', init);
    </script>
</body>
</html>
